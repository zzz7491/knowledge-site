name: 科技前沿自动更新

on:
  schedule:
    - cron: '0 */6 * * *'   # 每6小时运行一次
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install requests

      - name: 运行抓取脚本
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: |
          python scripts/fetch_tech_news.py

      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/每日更新/
          git commit -m "🤖 自动抓取科技前沿 $(date +'%Y-%m-%d %H:%M')" || echo "无变化"
          git push

      - name: 发送飞书通知
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          CURRENT_TIME=$(date +'%Y-%m-%d %H:%M:%S')
          LATEST_FILE=$(ls -t docs/每日更新/*-快报.md | head -1)
          FILE_NAME=$(basename "$LATEST_FILE")
          ARTICLE_COUNT=$(grep -E "共抓取.*篇" "$LATEST_FILE" | grep -oE '[0-9]+' | head -1)
          if [ -z "$ARTICLE_COUNT" ]; then
            ARTICLE_COUNT="若干"
          fi
          MESSAGE="🚀 东诚AI快报更新啦！\n📅 时间：${CURRENT_TIME}\n📄 文件：${FILE_NAME}\n📊 文章：${ARTICLE_COUNT} 篇\n🔗 查看：https://aidongcheng.com/docs/每日更新/${FILE_NAME%.md}"
          curl -X POST -H "Content-Type: application/json" \
            -d "{\"msg_type\": \"text\", \"content\": {\"text\": \"${MESSAGE}\"}}" \
            $FEISHU_WEBHOOK